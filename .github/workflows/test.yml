name: Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          fmt_result="$(gofmt -l .)"
          if [ -n "${fmt_result}" ]; then
            echo "The following files need gofmt:" >&2
            echo "${fmt_result}" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -v

  frankenphp-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: FrankenPHP E2E
        env:
          DOCKER_BUILD_ARGS: >-
            --cache-from type=gha,scope=frankenphp-e2e
            --cache-to type=gha,mode=max,scope=frankenphp-e2e
        run: ./e2e/frankenphp/run.sh
